<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physical AI — Lab Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: #2a2a26;
      --text: #e8e8e2;
      --text-muted: #66665e;
      --accent: #76b900;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Particle canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    header, main, footer { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      padding: 4rem 2rem 3.5rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      letter-spacing: 0.08em;
      line-height: 1.1;
      margin-bottom: 0.65rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    /* ── Grid ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 0.25s, border-color 0.25s, transform 0.25s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      border-color: var(--accent);
    }

    .card-image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 10;
      background: #252520;
    }

    .card-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card-image-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 8, 0);
      transition: background 0.3s ease;
      pointer-events: none;
    }

    .card:hover .card-image-wrap::after { background: rgba(10, 10, 8, 0.38); }
    .card:hover .card-image { transform: scale(1.04); }

    .card-title {
      padding: 0.85rem 1.1rem 0.95rem;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.4;
      transition: color 0.2s, background 0.2s;
    }

    .card:hover .card-title {
      color: var(--accent);
      background: #0a0a08;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--text);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <header>
    <h1>Physical AI: Experiments & Lab Notes</h1>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <p>Miguel Solis &middot; <a href="https://github.com/MiguelSolisSegura">GitHub</a></p>
  </footer>

  <script>
    // ── Cards ──
    fetch('projects/index.json')
      .then(r => r.json())
      .then(projects => {
        document.getElementById('grid').innerHTML = projects.map(p => `
          <a class="card" href="entry.html?id=${p.id}">
            <div class="card-image-wrap">
              <img class="card-image" src="${p.image}" alt="${p.title}" />
            </div>
            <div class="card-title">${p.title}</div>
          </a>
        `).join('');
      });

    // ── Particle network ──
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      const COUNT = 120, MAX_DIST = 140, SPEED = 0.35;
      let W = 0, H = 0, particles = [];

      function resize() {
        const nw = window.innerWidth, nh = window.innerHeight;
        if (W && H) {
          const sx = nw / W, sy = nh / H;
          particles.forEach(p => { p.x *= sx; p.y *= sy; });
        }
        W = canvas.width  = nw;
        H = canvas.height = nh;
      }

      class Dot {
        constructor() {
          this.x  = Math.random() * W;
          this.y  = Math.random() * H;
          this.vx = (Math.random() - 0.5) * SPEED;
          this.vy = (Math.random() - 0.5) * SPEED;
          this.r  = Math.random() * 1.5 + 1;
          this.phase  = Math.random() * Math.PI * 2;
          this.period = 4000 + Math.random() * 5000;
          this.alpha  = 1;
        }
        update(ts) {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0) this.x += W; else if (this.x > W) this.x -= W;
          if (this.y < 0) this.y += H; else if (this.y > H) this.y -= H;
          this.alpha = 0.3 + 0.7 * (Math.sin(ts / this.period * Math.PI * 2 + this.phase) + 1) / 2;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${0.75 * this.alpha})`;
          ctx.fill();
        }
      }

      window.addEventListener('resize', resize);
      resize();
      for (let i = 0; i < COUNT; i++) particles.push(new Dot());

      function loop(ts) {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          particles[i].update(ts);
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d  = Math.sqrt(dx * dx + dy * dy);
            if (d < MAX_DIST) {
              const a = (1 - d / MAX_DIST) * 0.4 * (particles[i].alpha + particles[j].alpha) / 2;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255, 255, 255, ${a})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
          particles[i].draw();
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>

</body>
</html>
